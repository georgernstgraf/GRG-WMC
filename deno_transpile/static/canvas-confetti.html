<!DOCTYPE html>
<html lang="de">

<head>
    <meta charset="UTF-8">
    <meta name="viewport"
          content="width=device-width, initial-scale=1.0">
    <title>Canvas Confetti Demo</title>
    <link rel="stylesheet"
          href="canvas-confetti.css">
    <script src="canvas-confetti.ts"
            defer></script>
</head>

<body>
    <main class="demo-page">
        <section class="hero-card">
            <p class="eyebrow">Transpile Server Demo</p>
            <h1>Canvas Confetti</h1>
            <p class="intro"> Dieses Mini-Projekt zeigt, dass browserorientiertes TypeScript mit einem importierten Paket direkt durch den
                Deno-Transpiler ausgeliefert werden kann. </p>
            <div class="button-row">
                <button id="burst-button"
                        type="button">Einmal starten</button>
                <button id="rain-button"
                        type="button">Regenmodus</button>
            </div>
            <p id="status-text"
               class="status-text">Bereit fuer Konfetti.</p>
        </section>
    </main>
